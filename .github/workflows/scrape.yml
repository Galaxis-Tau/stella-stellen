name: STELLA Stellenscraper

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4 lxml

      - name: Scraper ausführen
        run: python scraper.py

      - name: Änderungen committen und pushen
        run: |
          git config user.name "STELLA-Bot"
          git config user.email "stella-bot@noreply.github.com"
          git add docs/stellen.json
          git diff --staged --quiet && echo "Keine Änderungen." || (
            git commit -m "🔄 Stellen aktualisiert $(date +'%d.%m.%Y %H:%M')"
            git push
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
