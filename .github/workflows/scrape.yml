name: STELLA Stellenscraper

on:
  schedule:
    # Täglich um 06:00 Uhr UTC (= 07:00 / 08:00 Uhr MEZ/MESZ)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Manuell auslösbar über GitHub → Actions → "Run workflow"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4 lxml

      - name: Scraper ausführen
        run: python scraper.py

      - name: Ergebnis prüfen
        run: |
          echo "=== Erste 30 Zeilen stellen.json ==="
          head -30 docs/stellen.json || echo "Datei fehlt!"

      - name: Änderungen committen und pushen
        run: |
          git config user.name "STELLA-Bot"
          git config user.email "stella-bot@noreply.github.com"
          git add docs/stellen.json
          git diff --staged --quiet && echo "Keine Änderungen." || (
            git commit -m "🔄 Stellen aktualisiert $(date +'%d.%m.%Y %H:%M')"
            git push
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
